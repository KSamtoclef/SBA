<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScoutAI — Football Analyst</title>
  <meta name="description" content="AI-powered football predictions — Daily Slip, High-Probability Scanner & Rollover Planner"/>
  <!-- React + Babel (runs JSX in browser, no build step needed) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    html,body,#root{ margin:0; padding:0; background:#060a12; min-height:100vh; }
    *{ box-sizing:border-box; }
    ::-webkit-scrollbar{ width:3px; }
    ::-webkit-scrollbar-thumb{ background:#ffffff15; border-radius:2px; }
    .card{ background:#0d1422; border:1px solid #ffffff0c; border-radius:14px; }
    .inset{ background:#060a12; border:1px solid #ffffff08; border-radius:10px; }
    .tab{ background:none; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; color:#374151; padding:12px 20px; border-bottom:2px solid transparent; transition:all .2s; white-space:nowrap; }
    .tab.on{ color:#60a5fa; border-bottom-color:#3b82f6; }
    .tab:hover:not(.on){ color:#9ca3af; }
    .btn{ padding:10px 20px; border-radius:9px; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:700; transition:all .15s; display:inline-flex; align-items:center; gap:7px; }
    .btn-blue{ background:linear-gradient(135deg,#1e40af,#2563eb); color:#fff; }
    .btn-blue:hover{ opacity:.88; transform:translateY(-1px); }
    .btn-blue:disabled{ opacity:.35; cursor:not-allowed; transform:none; }
    .btn-green{ background:linear-gradient(135deg,#065f46,#059669); color:#fff; }
    .btn-green:hover{ opacity:.88; transform:translateY(-1px); }
    .btn-ghost{ background:transparent; border:1px solid #ffffff15; color:#6b7280; font-family:'DM Sans',sans-serif; font-size:12px; padding:5px 14px; border-radius:8px; cursor:pointer; transition:all .15s; }
    .btn-ghost:hover{ border-color:#ffffff30; color:#9ca3af; }
    input[type=number]{ background:#060a12; border:1px solid #ffffff12; border-radius:8px; color:#e2e8f0; padding:10px 14px; font-family:'DM Mono',monospace; font-size:14px; outline:none; width:100%; }
    input:focus{ border-color:#3b82f640; }
    @keyframes fu{ from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fu{ animation:fu .35s ease forwards; }
    @keyframes spin{ to{transform:rotate(360deg)} }
    @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.4} }
    .pu{ animation:pulse 1.6s ease infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ══════════════════════════════════════════════════════════
    // 🔑 STEP 1: PASTE YOUR RAPIDAPI KEY BETWEEN THE QUOTES BELOW
    const RAPIDAPI_KEY  = "2c3bb57e5cmsh2120c6d8b94c6a0p1de8e6jsnc4a4771e37b9";
    const RAPIDAPI_HOST = "free-football-api-data.p.rapidapi.com";
    const API_BASE      = "https://free-football-api-data.p.rapidapi.com";
    // ══════════════════════════════════════════════════════════

    const COMPETITIONS = [
      { code:"PL",  name:"Premier League",   color:"#3b82f6" },
      { code:"PD",  name:"La Liga",          color:"#f97316" },
      { code:"BL1", name:"Bundesliga",       color:"#ef4444" },
      { code:"SA",  name:"Serie A",          color:"#06b6d4" },
      { code:"FL1", name:"Ligue 1",          color:"#8b5cf6" },
      { code:"CL",  name:"Champions League", color:"#a855f7" },
    ];

    const ROLLOVER_KEY = "scoutai_rollover_v3";

    // ── HELPERS ───────────────────────────────────────────────────────────
    const avg      = arr => arr?.length ? +(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2) : 0;
    const todayStr = ()  => new Date().toISOString().slice(0,10);
    const getComp  = name => COMPETITIONS.find(c=>c.name===name)||{color:"#6b7280"};

    function calcStreak(results){
      if(!results?.length) return {t:null,n:0};
      const t=results[0]; let n=0;
      for(const r of results){ if(r===t) n++; else break; }
      return {t,n};
    }

    // ── API ───────────────────────────────────────────────────────────────
    async function apiFetch(path){
      const url = `${API_BASE}${path}`;
      const res = await fetch(url, {
        method: "GET",
        headers: {
          "x-rapidapi-key":  RAPIDAPI_KEY,
          "x-rapidapi-host": RAPIDAPI_HOST
        }
      });
      if(res.status===429) throw new Error("Rate limit hit — wait 1 minute and try again.");
      if(res.status===403) throw new Error("API key invalid or not subscribed to this API.");
      if(!res.ok) throw new Error(`API error ${res.status}: ${res.statusText}`);
      const data = await res.json();
      // Handle both direct array and wrapped {response:[]} formats
      return data;
    }

    // ── API: fetch today/upcoming fixtures ───────────────────────────────
    async function fetchTodayMatches(onStatus){
      for(let dayOffset=0; dayOffset<=7; dayOffset++){
        const d = new Date();
        d.setDate(d.getDate() + dayOffset);
        const dateStr = d.toISOString().slice(0,10);
        const label = dayOffset===0?"today":dayOffset===1?"tomorrow":`in ${dayOffset} days`;
        onStatus?.(`Checking fixtures ${label}...`);
        try{
          // Creativesdev API: Get Schedule Event Match by Date
          const data = await apiFetch(`/GetScheduleEventMatchByDate?matchDate=${dateStr}`);
          const events = data?.events || data?.result || data || [];
          const found = Array.isArray(events) ? events.filter(e=>e && (e.homeTeam||e.home_team||e.homeTeamName)) : [];
          if(found.length > 0){
            console.log(`Found ${found.length} fixtures on ${dateStr}`);
            const mapped = found.map(e=>({
              raw: e,
              comp: {
                name: e.leagueName||e.league_name||e.tournament||"Unknown League",
                code: e.leagueId||e.league_id||"?",
                color: "#6b7280"
              },
              matchDate: dateStr,
              dayOffset
            }));
            return { matches: mapped, dateStr, dayOffset };
          }
          console.log(`No fixtures on ${dateStr}, scanning ahead...`);
          if(dayOffset < 7) await new Promise(r=>setTimeout(r,1000));
        }catch(e){
          console.warn(`Failed ${dateStr}:`, e.message);
          if(dayOffset < 7) await new Promise(r=>setTimeout(r,1000));
        }
      }
      return { matches:[], dateStr:todayStr(), dayOffset:0 };
    }

    async function fetchByDate(dateStr, onStatus){
      onStatus?.(`Fetching fixtures for ${dateStr}...`);
      const data = await apiFetch(`/GetScheduleEventMatchByDate?matchDate=${dateStr}`);
      const events = data?.events || data?.result || data || [];
      const found = Array.isArray(events) ? events.filter(e=>e && (e.homeTeam||e.home_team||e.homeTeamName)) : [];
      const mapped = found.map(e=>({
        raw: e,
        comp: {
          name: e.leagueName||e.league_name||e.tournament||"Unknown League",
          code: e.leagueId||e.league_id||"?",
          color: "#6b7280"
        },
        matchDate: dateStr,
        dayOffset: 0
      }));
      return { matches: mapped, dateStr, dayOffset: 0 };
    }

    async function fetchTeamLastFive(leagueId){
      try{
        // Get last events for a league and filter by team
        const data = await apiFetch(`/GetLeagueLastEventsByLeague?leagueId=${leagueId}&numberOfEvents=20`);
        return data?.events || data?.result || data || [];
      }catch{ return []; }
    }

    function normalizeMatch(raw){
      // Normalize different field name conventions
      return {
        homeTeam: raw.homeTeam || raw.home_team || raw.homeTeamName || raw.home || "Home",
        awayTeam: raw.awayTeam || raw.away_team || raw.awayTeamName || raw.away || "Away",
        homeScore: raw.homeScore ?? raw.home_score ?? raw.goalsHomeTeam ?? null,
        awayScore: raw.awayScore ?? raw.away_score ?? raw.goalsAwayTeam ?? null,
        leagueId:  raw.leagueId  || raw.league_id  || raw.idLeague || null,
        leagueName:raw.leagueName|| raw.league_name|| raw.tournament|| "Unknown",
        matchDate: raw.matchDate || raw.date || raw.event_date || null,
        matchTime: raw.matchTime || raw.time || raw.event_time || "TBD",
        eventId:   raw.eventId   || raw.id  || raw.idEvent || Math.random(),
      };
    }

    function parseTeamStatsFromEvents(events, teamName){
      const results=[], goalsFor=[], goalsAgainst=[];
      for(const e of events){
        const n = normalizeMatch(e);
        const isHome = (n.homeTeam||"").toLowerCase().includes(teamName.toLowerCase().slice(0,5));
        const isAway = (n.awayTeam||"").toLowerCase().includes(teamName.toLowerCase().slice(0,5));
        if(!isHome && !isAway) continue;
        const gf = isHome ? n.homeScore : n.awayScore;
        const ga = isHome ? n.awayScore : n.homeScore;
        if(gf==null || ga==null) continue;
        goalsFor.push(+gf);
        goalsAgainst.push(+ga);
        results.push(+gf > +ga ? "W" : +gf < +ga ? "L" : "D");
      }
      const btts = results.filter((_,i)=>goalsFor[i]>0 && goalsAgainst[i]>0).length;
      return { results: results.slice(0,5), goalsFor: goalsFor.slice(0,5), goalsAgainst: goalsAgainst.slice(0,5), btts };
    }

    async function enrichMatch(rawEntry, comp, onStatus){
      const n = normalizeMatch(rawEntry.raw);
      onStatus?.(`Loading stats: ${n.homeTeam} vs ${n.awayTeam}...`);

      let hStats = { results:[], goalsFor:[], goalsAgainst:[], btts:0 };
      let aStats = { results:[], goalsFor:[], goalsAgainst:[], btts:0 };

      if(n.leagueId){
        try{
          await new Promise(r=>setTimeout(r,800));
          const leagueEvents = await fetchTeamLastFive(n.leagueId);
          hStats = parseTeamStatsFromEvents(leagueEvents, n.homeTeam);
          aStats = parseTeamStatsFromEvents(leagueEvents, n.awayTeam);
        }catch(e){ console.warn("Stats fetch failed:", e.message); }
      }

      return {
        id:     n.eventId,
        home:   n.homeTeam,
        away:   n.awayTeam,
        league: comp.name,
        time:   n.matchTime,
        homeStats:{
          last5:         hStats.results,
          goalsScored:   hStats.goalsFor,
          goalsConceded: hStats.goalsAgainst,
          bttsLast5:     hStats.btts,
          homeForm:      hStats.results,
        },
        awayStats:{
          last5:         aStats.results,
          goalsScored:   aStats.goalsFor,
          goalsConceded: aStats.goalsAgainst,
          bttsLast5:     aStats.btts,
          awayForm:      aStats.results,
        },
      };
    }
