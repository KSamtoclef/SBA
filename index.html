<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScoutAI — Football Analyst</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{min-height:100vh;background:#060a12}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:#ffffff15;border-radius:2px}
    .card{background:#0d1422;border:1px solid #ffffff0c;border-radius:14px}
    .inset{background:#060a12;border:1px solid #ffffff08;border-radius:10px}
    .tab{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#374151;padding:12px 20px;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
    .tab.on{color:#60a5fa;border-bottom-color:#3b82f6}
    .tab:hover:not(.on){color:#9ca3af}
    .btn{padding:10px 20px;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
    .btn-blue{background:linear-gradient(135deg,#1e40af,#2563eb);color:#fff}
    .btn-blue:hover{opacity:.88;transform:translateY(-1px)}
    .btn-blue:disabled{opacity:.35;cursor:not-allowed;transform:none}
    .btn-green{background:linear-gradient(135deg,#065f46,#059669);color:#fff}
    .btn-green:hover{opacity:.88;transform:translateY(-1px)}
    .btn-ghost{background:transparent;border:1px solid #ffffff15;color:#6b7280;font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 14px;border-radius:8px;cursor:pointer}
    .btn-ghost:hover{border-color:#ffffff30;color:#9ca3af}
    input[type=number],input[type=date]{background:#060a12;border:1px solid #ffffff12;border-radius:8px;color:#e2e8f0;padding:10px 14px;font-family:'DM Mono',monospace;font-size:13px;outline:none}
    input[type=number]{width:100%}
    input:focus{border-color:#3b82f640}
    @keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fu{animation:fu .35s ease forwards}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .pu{animation:pulse 1.6s ease infinite}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ══════════════════════════════════════════════════
// 🔑 PASTE YOUR RAPIDAPI KEY BETWEEN THE QUOTES
const RAPIDAPI_KEY  = "2c3bb57e5cmsh2120c6d8b94c6a0p1de8e6jsnc4a4771e37b9";
const RAPIDAPI_HOST = "free-football-api-data.p.rapidapi.com";
const API_BASE      = "https://free-football-api-data.p.rapidapi.com";
// ══════════════════════════════════════════════════

const ROLLOVER_KEY = "scoutai_v4";
const LEAGUE_COLORS = ["#3b82f6","#f97316","#ef4444","#06b6d4","#8b5cf6","#a855f7","#ec4899","#14b8a6"];
const getLeagueColor = (name="") => LEAGUE_COLORS[Math.abs(name.split("").reduce((a,c)=>a+c.charCodeAt(0),0)) % LEAGUE_COLORS.length];

const avg = arr => arr?.length ? +(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2) : 0;
const todayStr = () => new Date().toISOString().slice(0,10);

function calcStreak(results){
  if(!results?.length) return {t:null,n:0};
  const t=results[0]; let n=0;
  for(const r of results){if(r===t)n++;else break;}
  return {t,n};
}

function calcRollover(start,target,odds){
  const steps=[]; let bal=start,s=1;
  while(bal<target&&s<=60){
    const payout=+(bal*odds).toFixed(2);
    steps.push({step:s,stake:+bal.toFixed(2),odds,payout});
    bal=payout; s++;
    if(bal>=target) break;
  }
  return steps;
}

// ── API ──────────────────────────────────────────
async function apiFetch(path){
  const res = await fetch(`${API_BASE}${path}`,{
    method:"GET",
    headers:{
      "x-rapidapi-key": RAPIDAPI_KEY,
      "x-rapidapi-host": RAPIDAPI_HOST
    }
  });
  if(res.status===403) throw new Error("API key invalid. Check your RapidAPI key.");
  if(res.status===429) throw new Error("Rate limit hit — wait 1 minute and retry.");
  if(!res.ok) throw new Error(`API error ${res.status}`);
  return res.json();
}

function extractEvents(data){
  if(!data) return [];
  if(Array.isArray(data)) return data;
  if(Array.isArray(data.events)) return data.events;
  if(Array.isArray(data.result)) return data.result;
  if(Array.isArray(data.data)) return data.data;
  return [];
}

function normalizeEvent(e){
  return {
    homeTeam:  e.homeTeam||e.home_team||e.homeTeamName||e.strHomeTeam||e.home||"Home",
    awayTeam:  e.awayTeam||e.away_team||e.awayTeamName||e.strAwayTeam||e.away||"Away",
    homeScore: e.homeScore??e.home_score??e.intHomeScore??e.goalsHomeTeam??null,
    awayScore: e.awayScore??e.away_score??e.intAwayScore??e.goalsAwayTeam??null,
    leagueId:  e.leagueId||e.league_id||e.idLeague||e.league?.id||null,
    leagueName:e.leagueName||e.league_name||e.strLeague||e.tournament||e.league?.name||"Unknown League",
    time:      e.matchTime||e.time||e.event_time||e.strTime||"TBD",
    id:        e.eventId||e.id||e.idEvent||e.fixture?.id||Math.random(),
  };
}

function parseStatsFromEvents(events, teamName){
  const key = teamName.toLowerCase().slice(0,6);
  const results=[],gf=[],ga=[];
  for(const e of events){
    const n=normalizeEvent(e);
    const isHome = n.homeTeam.toLowerCase().includes(key);
    const isAway = n.awayTeam.toLowerCase().includes(key);
    if(!isHome&&!isAway) continue;
    const f=isHome?n.homeScore:n.awayScore;
    const a=isHome?n.awayScore:n.homeScore;
    if(f==null||a==null) continue;
    gf.push(+f); ga.push(+a);
    results.push(+f>+a?"W":+f<+a?"L":"D");
    if(results.length>=5) break;
  }
  return {
    results, gf, ga,
    btts: results.filter((_,i)=>gf[i]>0&&ga[i]>0).length
  };
}

async function fetchFixturesForDate(dateStr, onStatus){
  onStatus?.(`Fetching fixtures for ${dateStr}...`);
  const data = await apiFetch(`/GetScheduleEventMatchByDate?matchDate=${dateStr}`);
  const events = extractEvents(data);
  return events.filter(e=>{
    const n=normalizeEvent(e);
    return n.homeTeam!=="Home" && n.awayTeam!=="Away";
  }).map(e=>{
    const n=normalizeEvent(e);
    return {raw:e, n, leagueName:n.leagueName, leagueId:n.leagueId};
  });
}

async function fetchTeamHistory(leagueId){
  try{
    const data = await apiFetch(`/GetLeagueLastEventsByLeague?leagueId=${leagueId}&numberOfEvents=30`);
    return extractEvents(data);
  }catch{ return []; }
}

async function enrichMatches(fixtures, onStatus){
  const enriched=[];
  // Group by leagueId to minimize API calls
  const leagueCache={};
  for(const fix of fixtures.slice(0,8)){
    const {n, leagueName, leagueId} = fix;
    onStatus?.(`Loading stats: ${n.homeTeam} vs ${n.awayTeam}...`);
    let hStats={results:[],gf:[],ga:[],btts:0};
    let aStats={results:[],gf:[],ga:[],btts:0};
    if(leagueId){
      try{
        if(!leagueCache[leagueId]){
          await new Promise(r=>setTimeout(r,700));
          leagueCache[leagueId] = await fetchTeamHistory(leagueId);
        }
        const hist = leagueCache[leagueId];
        hStats = parseStatsFromEvents(hist, n.homeTeam);
        aStats = parseStatsFromEvents(hist, n.awayTeam);
      }catch(e){console.warn("Stats failed:",e.message);}
    }
    enriched.push({
      id: n.id,
      home: n.homeTeam,
      away: n.awayTeam,
      league: leagueName,
      time: n.time,
      homeStats:{last5:hStats.results,goalsScored:hStats.gf,goalsConceded:hStats.ga,bttsLast5:hStats.btts,homeForm:hStats.results},
      awayStats:{last5:aStats.results,goalsScored:aStats.gf,goalsConceded:aStats.ga,bttsLast5:aStats.btts,awayForm:aStats.results},
    });
  }
  return enriched;
}

// ── AI ────────────────────────────────────────────
function buildMatchBlock(matches){
  return matches.map(m=>{
    const hS=calcStreak(m.homeStats.last5), aS=calcStreak(m.awayStats.last5);
    return `MATCH: ${m.home} vs ${m.away} | ${m.league} | ${m.time}
${m.home}: last5=${m.homeStats.last5.join(",")||"?"} streak=${hS.n}x${hS.t||"?"} | goalsAvg=${avg(m.homeStats.goalsScored)} concededAvg=${avg(m.homeStats.goalsConceded)} | BTTS ${m.homeStats.bttsLast5}/5
${m.away}: last5=${m.awayStats.last5.join(",")||"?"} streak=${aS.n}x${aS.t||"?"} | goalsAvg=${avg(m.awayStats.goalsScored)} concededAvg=${avg(m.awayStats.goalsConceded)} | BTTS ${m.awayStats.bttsLast5}/5`;
  }).join("\n---\n");
}

const SLIP_PROMPT = matches => `Act as an expert football analyst focused on high-probability betting.

MATCH DATA:
${buildMatchBlock(matches)}

YOUR RULES:
- Select ONLY games with VERY HIGH probability based on the stats
- Focus on: Over 1.5, GG/BTTS, safe Over 2.5, team over 0.5, straight win
- Analyse goal trends, team consistency, attack vs defence strength, momentum
- NO risky games. NO guessing. ONLY confident picks
- Return a final slip of 3-5 games

Respond ONLY with valid JSON, no markdown:
{"slip":[{"match":"Home vs Away","league":"league","market":"market","pick":"pick","confidence":85,"reason":"one sentence based on stats"}],"summary":"one sentence"}`;

const SCANNER_PROMPT = matches => `Act as a top-level football data analyst. ONLY high-probability matches.

MATCH DATA:
${buildMatchBlock(matches)}

RULES:
- NO guesswork. Only statistically backed selections
- Over 1.5: only teams averaging 1.5+ goals in last 5
- GG/BTTS: only when both teams BTTS in 3+ of last 5
- If nothing qualifies set nobets=true

Respond ONLY with valid JSON, no markdown:
{"nobets":false,"nobet_reason":"","picks":[{"match":"Home vs Away","league":"league","market":"market","pick":"pick","confidence":88,"reasoning":"1-2 sentences"}]}`;

async function callClaude(prompt){
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]})
  });
  const data = await res.json();
  const text = data.content.map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();
  return JSON.parse(text);
}

// ── UI ATOMS ─────────────────────────────────────
function FormDot({r}){
  const c={W:"#00e676",D:"#ffd740",L:"#ff5252"};
  return <span style={{width:20,height:20,borderRadius:3,background:(c[r]||"#555")+"18",border:`1px solid ${c[r]||"#555"}44`,color:c[r]||"#555",fontSize:9,fontWeight:700,display:"inline-flex",alignItems:"center",justifyContent:"center",fontFamily:"monospace"}}>{r||"?"}</span>;
}
function Tag({label,color="#3b82f6"}){
  return <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,background:color+"18",color,border:`1px solid ${color}28`,letterSpacing:".04em",whiteSpace:"nowrap"}}>{label}</span>;
}
function ConfBar({v,color}){
  const c=color||(v>=75?"#00e676":v>=55?"#ffd740":"#ff5252");
  return <div style={{height:4,background:"#ffffff0a",borderRadius:2,overflow:"hidden",marginTop:5}}>
    <div style={{height:"100%",width:`${v}%`,background:c,borderRadius:2,transition:"width 1.2s ease",boxShadow:`0 0 5px ${c}44`}}/>
  </div>;
}
function Spin({color="#3b82f6"}){
  return <span style={{width:13,height:13,border:`2px solid ${color}33`,borderTop:`2px solid ${color}`,borderRadius:"50%",display:"inline-block",animation:"spin .7s linear infinite",flexShrink:0}}/>;
}
function StatRow({label,home,away,hi}){
  return <div style={{display:"grid",gridTemplateColumns:"1fr 140px 1fr",gap:6,padding:"6px 0",borderBottom:"1px solid #ffffff05"}}>
    <span style={{textAlign:"right",fontSize:12,color:hi?"#60a5fa":"#6b7280",fontWeight:hi?600:400}}>{home}</span>
    <span style={{textAlign:"center",fontSize:10,color:"#374151",textTransform:"uppercase",letterSpacing:".05em"}}>{label}</span>
    <span style={{fontSize:12,color:hi?"#f97316":"#6b7280",fontWeight:hi?600:400}}>{away}</span>
  </div>;
}
const cc = v => v>=75?"#00e676":v>=55?"#ffd740":"#ff5252";

// ══════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════
function App(){
  const [tab,setTab]           = useState("slip");
  const [matches,setMatches]   = useState([]);
  const [loading,setLoading]   = useState(false);
  const [status,setStatus]     = useState("");
  const [error,setError]       = useState(null);
  const [ready,setReady]       = useState(false);
  const [matchDate,setMatchDate]   = useState("");
  const [pickedDate,setPickedDate] = useState("");
  const [expanded,setExpanded]     = useState({});
  const [slipResult,setSlipResult] = useState(null);
  const [scanResult,setScanResult] = useState(null);
  const [loadingSlip,setLoadingSlip] = useState(false);
  const [loadingScan,setLoadingScan] = useState(false);
  const [rollover,setRollover] = useState(()=>{
    try{return JSON.parse(localStorage.getItem(ROLLOVER_KEY))||{start:"10000",target:"200000",odds:"3",currentStep:0,currentBalance:null,log:[]};}
    catch{return{start:"10000",target:"200000",odds:"3",currentStep:0,currentBalance:null,log:[]};}
  });
  useEffect(()=>{localStorage.setItem(ROLLOVER_KEY,JSON.stringify(rollover));},[rollover]);

  const today = new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});

  const loadFixtures = useCallback(async(customDate)=>{
    setLoading(true); setError(null); setMatches([]); setReady(false);
    setSlipResult(null); setScanResult(null); setMatchDate("");
    try{
      if(customDate){
        setStatus(`Fetching fixtures for ${customDate}...`);
        const fixtures = await fetchFixturesForDate(customDate, setStatus);
        if(!fixtures.length){setError(`No fixtures found for ${customDate}.`);setLoading(false);return;}
        setStatus(`Found ${fixtures.length} fixtures — loading team stats...`);
        const enriched = await enrichMatches(fixtures, setStatus);
        if(!enriched.length){setError("Stats failed to load. Try again.");setLoading(false);return;}
        setMatches(enriched); setMatchDate(customDate); setReady(true);
      } else {
        // Auto-scan today + 7 days
        for(let d=0;d<=7;d++){
          const dt=new Date(); dt.setDate(dt.getDate()+d);
          const ds=dt.toISOString().slice(0,10);
          const label=d===0?"today":d===1?"tomorrow":`${ds}`;
          setStatus(`Scanning ${label}...`);
          try{
            const fixtures = await fetchFixturesForDate(ds, setStatus);
            if(fixtures.length){
              setStatus(`Found ${fixtures.length} fixtures for ${label} — loading stats...`);
              const enriched = await enrichMatches(fixtures, setStatus);
              if(enriched.length){setMatches(enriched);setMatchDate(label);setReady(true);break;}
            }
            if(d<7) await new Promise(r=>setTimeout(r,800));
          }catch(e){
            console.warn(`Scan failed for ${ds}:`,e.message);
            if(d<7) await new Promise(r=>setTimeout(r,800));
          }
        }
        if(!ready && !loading){
          // check if we set ready inside loop
        }
      }
    }catch(e){setError(e.message||"Failed to load fixtures.");}
    setStatus(""); setLoading(false);
  },[]);

  async function runSlip(){
    setLoadingSlip(true); setSlipResult(null);
    try{setSlipResult(await callClaude(SLIP_PROMPT(matches)));}
    catch{setSlipResult({error:true});}
    setLoadingSlip(false);
  }
  async function runScanner(){
    setLoadingScan(true); setScanResult(null);
    try{setScanResult(await callClaude(SCANNER_PROMPT(matches)));}
    catch{setScanResult({error:true});}
    setLoadingScan(false);
  }

  // Rollover
  const rStart=parseFloat(rollover.start)||10000, rTarget=parseFloat(rollover.target)||200000, rOdds=parseFloat(rollover.odds)||3;
  const rSteps=calcRollover(rStart,rTarget,rOdds), rStep=rollover.currentStep||0;
  const rBal=rollover.currentBalance!==null?rollover.currentBalance:rStart;
  const rProg=rTarget>rStart?Math.min(100,Math.round((Math.log(Math.max(rBal,rStart)/rStart)/Math.log(rTarget/rStart))*100)):0;
  function logResult(won){
    const s=rSteps[rStep]; if(!s) return;
    setRollover(r=>({...r,currentStep:won?rStep+1:0,currentBalance:won?s.payout:rStart,
      log:[{step:rStep+1,stake:s.stake,odds:rOdds,result:won?"WON":"LOST",balance:won?s.payout:rStart,date:new Date().toLocaleDateString()},...(r.log||[])].slice(0,30)
    }));
  }

  const Banner = () => (
    <div className="card" style={{padding:28,textAlign:"center",marginBottom:20}}>
      {loading ? (
        <div style={{color:"#3b82f6"}}>
          <div style={{fontSize:30,marginBottom:10}}>📡</div>
          <div style={{fontWeight:600,fontSize:14,marginBottom:8}}>Scanning for fixtures...</div>
          <div style={{fontSize:12,color:"#60a5fa",marginBottom:6}}>{status}</div>
          <div style={{fontSize:11,color:"#374151"}}>Checking today + up to 7 days ahead</div>
        </div>
      ) : error ? (
        <div>
          <div style={{fontSize:30,marginBottom:10}}>⚠️</div>
          <div style={{color:"#ff5252",fontWeight:600,marginBottom:12,fontSize:13,lineHeight:1.6}}>{error}</div>
          <button className="btn btn-blue" onClick={()=>loadFixtures()}>↺ Try Again</button>
        </div>
      ) : (
        <div>
          <div style={{fontSize:34,marginBottom:10}}>🏟️</div>
          <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>Load Fixtures</div>
          <div style={{fontSize:13,color:"#374151",marginBottom:18}}>
            Auto-scans today + next 7 days across all leagues.<br/>Or pick a specific date below.
          </div>
          <button className="btn btn-green" style={{marginBottom:16}} onClick={()=>loadFixtures()}>
            ⚡ Find Nearest Fixtures
          </button>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:8,flexWrap:"wrap"}}>
            <input type="date" value={pickedDate} onChange={e=>setPickedDate(e.target.value)}
              min={todayStr()}
              style={{background:"#0d1422",border:"1px solid #ffffff18",borderRadius:8,color:"#e2e8f0",padding:"9px 12px",fontFamily:"'DM Mono',monospace",fontSize:13,outline:"none"}}/>
            <button className="btn btn-blue" disabled={!pickedDate} onClick={()=>loadFixtures(pickedDate)}
              style={{opacity:pickedDate?1:0.4}}>
              Search Date
            </button>
          </div>
        </div>
      )}
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#060a12",fontFamily:"'DM Sans','Segoe UI',sans-serif",color:"#e2e8f0"}}>

      {/* HEADER */}
      <div style={{borderBottom:"1px solid #ffffff08",padding:"0 20px"}}>
        <div style={{maxWidth:900,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:58}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#1e40af,#3b82f6)",display:"grid",placeItems:"center",fontSize:18,flexShrink:0}}>⚽</div>
            <div>
              <div style={{fontWeight:700,fontSize:18,letterSpacing:"-0.03em",lineHeight:1.1}}>ScoutAI</div>
              <div style={{fontSize:10,color:"#3b82f6",fontWeight:700,letterSpacing:".1em"}}>ANALYST EDITION</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {ready && <Tag label={`✓ ${matches.length} fixtures · ${matchDate}`} color="#00e676"/>}
            <span style={{fontSize:12,color:"#1f2937"}}>{today}</span>
          </div>
        </div>
      </div>

      {/* TABS */}
      <div style={{borderBottom:"1px solid #ffffff08",overflowX:"auto"}}>
        <div style={{maxWidth:900,margin:"0 auto",padding:"0 20px",display:"flex"}}>
          {[["slip","📋 Daily Slip"],["scanner","🔍 HP Scanner"],["rollover","📈 Rollover"]].map(([id,label])=>(
            <button key={id} className={`tab${tab===id?" on":""}`} onClick={()=>setTab(id)}>{label}</button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"24px 20px"}}>

        {/* ══ SLIP ══ */}
        {tab==="slip" && (
          <div style={{display:"flex",flexDirection:"column",gap:18}}>
            {!ready && <Banner/>}
            {ready && <>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
                <div>
                  <h2 style={{fontSize:18,fontWeight:700}}>Daily Slip Builder</h2>
                  <p style={{fontSize:13,color:"#374151",marginTop:3}}>AI picks 3-5 highest-probability games. No guessing.</p>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button className="btn-ghost" onClick={()=>loadFixtures()} disabled={loading}>↺ Refresh</button>
                  <button className="btn btn-blue" onClick={runSlip} disabled={loadingSlip}>
                    {loadingSlip?<><Spin/>Analysing...</>:"⚡ Build Today's Slip"}
                  </button>
                </div>
              </div>

              {/* Fixtures */}
              <div className="card" style={{padding:16}}>
                <div style={{fontSize:11,color:"#374151",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>
                  Fixtures — {matchDate} — {matches.length} matches
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {matches.map(m=>{
                    const hS=calcStreak(m.homeStats.last5), aS=calcStreak(m.awayStats.last5), isOpen=expanded[m.id];
                    const lc=getLeagueColor(m.league);
                    return (
                      <div key={m.id} style={{background:"#060a12",borderRadius:10,border:"1px solid #ffffff08",overflow:"hidden"}}>
                        <div style={{padding:"10px 12px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}
                          onClick={()=>setExpanded(e=>({...e,[m.id]:!e[m.id]}))}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <div style={{width:5,height:5,borderRadius:2,background:lc,flexShrink:0}}/>
                            <div>
                              <div style={{fontSize:13,fontWeight:600}}>{m.home} <span style={{color:"#1f2937",fontWeight:300}}>vs</span> {m.away}</div>
                              <div style={{fontSize:10,color:"#374151"}}>{m.league} · {m.time}</div>
                            </div>
                          </div>
                          <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
                            {hS.t==="W"&&hS.n>=3&&<Tag label={`🔥${hS.n}W`} color="#00e676"/>}
                            {aS.t==="W"&&aS.n>=3&&<Tag label={`🔥${aS.n}W`} color="#00e676"/>}
                            <div style={{display:"flex",gap:2}}>{(m.homeStats.last5||[]).map((r,i)=><FormDot key={i} r={r}/>)}</div>
                            <span style={{fontSize:10,color:"#1f2937"}}>vs</span>
                            <div style={{display:"flex",gap:2}}>{(m.awayStats.last5||[]).map((r,i)=><FormDot key={i} r={r}/>)}</div>
                            <span style={{fontSize:11,color:"#374151",marginLeft:4}}>{isOpen?"▲":"▼"}</span>
                          </div>
                        </div>
                        {isOpen && (
                          <div style={{padding:"10px 12px",borderTop:"1px solid #ffffff06"}}>
                            <StatRow label="Avg goals scored" home={avg(m.homeStats.goalsScored)} away={avg(m.awayStats.goalsScored)} hi/>
                            <StatRow label="Avg goals conceded" home={avg(m.homeStats.goalsConceded)} away={avg(m.awayStats.goalsConceded)}/>
                            <StatRow label="BTTS in last 5" home={`${m.homeStats.bttsLast5}/5`} away={`${m.awayStats.bttsLast5}/5`} hi/>
                            <StatRow label="Home form" home={(m.homeStats.homeForm||[]).join(" ")||"—"} away="—"/>
                            <StatRow label="Away form" home="—" away={(m.awayStats.awayForm||[]).join(" ")||"—"}/>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>

              {loadingSlip && (
                <div className="card pu" style={{padding:32,textAlign:"center",color:"#3b82f6",fontSize:14}}>
                  <div style={{fontSize:28,marginBottom:8}}>🧠</div>
                  Analysing goal trends, momentum & consistency...
                </div>
              )}

              {slipResult && !loadingSlip && (
                <div className="fu" style={{display:"flex",flexDirection:"column",gap:12}}>
                  {slipResult.error ? (
                    <div className="card" style={{padding:24,textAlign:"center",color:"#ff5252"}}>Analysis failed. Please try again.</div>
                  ) : <>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                      <h3 style={{fontSize:15,fontWeight:700}}>📋 Today's Slip — {slipResult.slip?.length} picks</h3>
                      <Tag label="LIVE DATA" color="#00e676"/>
                    </div>
                    {slipResult.slip?.map((pick,i)=>(
                      <div key={i} className="card" style={{padding:16}}>
                        <div style={{marginBottom:10}}>
                          <div style={{fontSize:10,color:getLeagueColor(pick.league),fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>{pick.league}</div>
                          <div style={{fontSize:15,fontWeight:700}}>{pick.match}</div>
                        </div>
                        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
                          <Tag label={pick.market} color="#3b82f6"/>
                          <span style={{fontSize:14,fontWeight:700,color:"#60a5fa"}}>{pick.pick}</span>
                          <span style={{marginLeft:"auto",fontSize:12,color:"#6b7280"}}>Confidence <strong style={{color:cc(pick.confidence),fontFamily:"DM Mono"}}>{pick.confidence}%</strong></span>
                        </div>
                        <ConfBar v={pick.confidence}/>
                        <div style={{marginTop:10,fontSize:12,color:"#6b7280",lineHeight:1.65,background:"#060a12",padding:"8px 10px",borderRadius:7,border:"1px solid #ffffff06"}}>
                          💡 {pick.reason}
                        </div>
                      </div>
                    ))}
                    <div className="inset" style={{padding:14,fontSize:13,color:"#6b7280"}}>{slipResult.summary}</div>
                  </>}
                </div>
              )}
            </>}
          </div>
        )}

        {/* ══ SCANNER ══ */}
        {tab==="scanner" && (
          <div style={{display:"flex",flexDirection:"column",gap:18}}>
            {!ready && <Banner/>}
            {ready && <>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
                <div>
                  <h2 style={{fontSize:18,fontWeight:700}}>High-Probability Scanner</h2>
                  <p style={{fontSize:13,color:"#374151",marginTop:3}}>Strict filter. Only Over 1.5 and GG/BTTS. Returns NO BET if nothing qualifies.</p>
                </div>
                <button className="btn btn-blue" onClick={runScanner} disabled={loadingScan}>
                  {loadingScan?<><Spin color="#a855f7"/>Scanning...</>:"🔍 Run Scanner"}
                </button>
              </div>
              <div className="inset" style={{padding:12,display:"flex",gap:20,flexWrap:"wrap"}}>
                {[["Markets","Over 1.5 · GG/BTTS"],["Filter","BTTS ≥ 3/5 | Goals avg ≥ 1.5"],["Rule","NO BET if nothing qualifies"]].map(([l,v])=>(
                  <div key={l}><div style={{fontSize:10,color:"#374151",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em"}}>{l}</div><div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>{v}</div></div>
                ))}
              </div>
              {loadingScan && (
                <div className="card pu" style={{padding:32,textAlign:"center",color:"#a855f7",fontSize:14}}>
                  <div style={{fontSize:28,marginBottom:8}}>🔍</div>Running statistical filters...
                </div>
              )}
              {scanResult && !loadingScan && (
                <div className="fu">
                  {scanResult.error ? (
                    <div className="card" style={{padding:24,textAlign:"center",color:"#ff5252"}}>Scanner failed. Please try again.</div>
                  ) : scanResult.nobets ? (
                    <div className="card" style={{padding:36,textAlign:"center"}}>
                      <div style={{fontSize:36,marginBottom:12}}>🚫</div>
                      <div style={{fontSize:18,fontWeight:700,color:"#ff5252",marginBottom:8}}>NO BET TODAY</div>
                      <div style={{fontSize:13,color:"#6b7280",maxWidth:400,margin:"0 auto",lineHeight:1.7}}>{scanResult.nobet_reason}</div>
                    </div>
                  ) : (
                    <div style={{display:"flex",flexDirection:"column",gap:12}}>
                      <h3 style={{fontSize:15,fontWeight:700}}>🎯 {scanResult.picks?.length} Qualified Picks</h3>
                      {scanResult.picks?.map((pick,i)=>(
                        <div key={i} className="card" style={{padding:16}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                            <div>
                              <div style={{fontSize:10,color:getLeagueColor(pick.league),fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>{pick.league}</div>
                              <div style={{fontSize:15,fontWeight:700}}>{pick.match}</div>
                            </div>
                            <span style={{fontSize:14,fontWeight:700,color:cc(pick.confidence),fontFamily:"DM Mono",flexShrink:0,marginLeft:10}}>{pick.confidence}%</span>
                          </div>
                          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
                            <Tag label={pick.market} color="#a855f7"/>
                            <span style={{fontSize:14,fontWeight:700,color:"#c084fc"}}>{pick.pick}</span>
                          </div>
                          <ConfBar v={pick.confidence} color="#a855f7"/>
                          <div style={{marginTop:10,fontSize:12,color:"#6b7280",lineHeight:1.65}}>{pick.reasoning}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </>}
          </div>
        )}

        {/* ══ ROLLOVER ══ */}
        {tab==="rollover" && (
          <div style={{display:"flex",flexDirection:"column",gap:18}}>
            <div>
              <h2 style={{fontSize:18,fontWeight:700}}>📈 Rollover Planner</h2>
              <p style={{fontSize:13,color:"#374151",marginTop:3}}>Set your balance, target and odds. Track every step.</p>
            </div>
            <div className="card" style={{padding:18}}>
              <div style={{fontSize:11,color:"#374151",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",marginBottom:14}}>Setup</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                {[["Starting Balance (₦)","start"],["Target (₦)","target"],["Odds per Step","odds"]].map(([label,key])=>(
                  <div key={key}>
                    <div style={{fontSize:11,color:"#4b5563",marginBottom:6,fontWeight:500}}>{label}</div>
                    <input type="number" value={rollover[key]} onChange={e=>setRollover(r=>({...r,[key]:e.target.value,currentStep:0,currentBalance:null,log:[]}))}/>
                  </div>
                ))}
              </div>
            </div>
            <div className="card" style={{padding:18}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:12,flexWrap:"wrap",gap:8}}>
                <div>
                  <div style={{fontSize:11,color:"#374151",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em"}}>Current Balance</div>
                  <div style={{display:"flex",alignItems:"baseline",gap:8,marginTop:4}}>
                    <span style={{fontSize:30,fontWeight:700,color:"#00e676",fontFamily:"DM Mono"}}>₦{rBal.toLocaleString()}</span>
                    <span style={{fontSize:13,color:"#374151"}}>of ₦{rTarget.toLocaleString()}</span>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:11,color:"#374151",fontWeight:600}}>Step {rStep+1} / {rSteps.length}</div>
                  <div style={{fontSize:22,fontWeight:700,color:"#ffd740",fontFamily:"DM Mono"}}>{rProg}%</div>
                </div>
              </div>
              <div style={{height:8,background:"#ffffff08",borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${rProg}%`,background:"linear-gradient(90deg,#1d4ed8,#00e676)",borderRadius:4,transition:"width 1s ease"}}/>
              </div>
            </div>
            {rStep<rSteps.length && rBal<rTarget && (
              <div className="card" style={{padding:18,border:"1px solid #3b82f622"}}>
                <div style={{fontSize:11,color:"#3b82f6",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",marginBottom:14}}>Step {rStep+1} — Place This Bet</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
                  {[["Stake",`₦${rSteps[rStep]?.stake.toLocaleString()}`,"#e2e8f0"],["Odds",`${rOdds}x`,"#ffd740"],["If Win",`₦${rSteps[rStep]?.payout.toLocaleString()}`,"#00e676"]].map(([l,v,c])=>(
                    <div key={l} className="inset" style={{padding:"10px 12px",textAlign:"center"}}>
                      <div style={{fontSize:10,color:"#374151",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em"}}>{l}</div>
                      <div style={{fontSize:18,fontWeight:700,color:c,fontFamily:"DM Mono",marginTop:4}}>{v}</div>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  <button className="btn btn-blue" style={{flex:1,minWidth:140,justifyContent:"center"}} onClick={()=>logResult(true)}>✓ Won → Step {rStep+2}</button>
                  <button style={{flex:1,minWidth:140,justifyContent:"center",background:"#ff525218",border:"1px solid #ff525230",color:"#ff5252",borderRadius:9,fontFamily:"inherit",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6,padding:"10px 20px"}} onClick={()=>logResult(false)}>✗ Lost — Reset</button>
                </div>
                <div style={{marginTop:10,fontSize:12,color:"#374151",textAlign:"center"}}>⚠️ A loss resets to ₦{rStart.toLocaleString()}</div>
              </div>
            )}
            {rBal>=rTarget && (
              <div className="card fu" style={{padding:30,textAlign:"center",border:"1px solid #00e67622"}}>
                <div style={{fontSize:40,marginBottom:10}}>🏆</div>
                <div style={{fontSize:22,fontWeight:700,color:"#00e676"}}>Target Reached!</div>
                <div style={{fontSize:14,color:"#6b7280",marginTop:8}}>₦{rBal.toLocaleString()} — goal achieved!</div>
                <button className="btn-ghost" style={{marginTop:16}} onClick={()=>setRollover(r=>({...r,currentStep:0,currentBalance:parseFloat(r.start),log:[]}))}>Start New Rollover</button>
              </div>
            )}
            <div className="card" style={{padding:18}}>
              <div style={{fontSize:11,color:"#374151",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",marginBottom:14}}>
                {rSteps.length}-Step Plan · ₦{rStart.toLocaleString()} → ₦{rTarget.toLocaleString()} at {rOdds}x
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:300,overflowY:"auto"}}>
                {rSteps.map((s,i)=>{
                  const done=i<rStep, cur=i===rStep;
                  return (
                    <div key={i} style={{display:"grid",gridTemplateColumns:"28px 1fr 40px 1fr",gap:8,alignItems:"center",padding:"7px 10px",borderRadius:8,background:cur?"#3b82f614":done?"#00e67608":"transparent",border:cur?"1px solid #3b82f628":done?"1px solid #00e67618":"1px solid transparent",opacity:done?0.5:1}}>
                      <span style={{fontSize:12,fontWeight:700,color:cur?"#60a5fa":done?"#00e676":"#374151",fontFamily:"DM Mono",textAlign:"center"}}>{done?"✓":cur?"▶":s.step}</span>
                      <span style={{fontSize:12,color:"#6b7280"}}>Stake <span style={{color:"#9ca3af",fontFamily:"DM Mono"}}>₦{s.stake.toLocaleString()}</span></span>
                      <span style={{fontSize:11,color:"#374151",fontFamily:"DM Mono"}}>×{s.odds}</span>
                      <span style={{fontSize:13,fontWeight:700,color:"#00e676",fontFamily:"DM Mono",textAlign:"right"}}>₦{s.payout.toLocaleString()}</span>
                    </div>
                  );
                })}
              </div>
            </div>
            {rollover.log?.length>0 && (
              <div className="card" style={{padding:18}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div style={{fontSize:11,color:"#374151",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em"}}>Bet History</div>
                  <button className="btn-ghost" onClick={()=>setRollover(r=>({...r,log:[]}))}>Clear</button>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {rollover.log.map((e,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:"#060a12",borderRadius:8,border:"1px solid #ffffff06",flexWrap:"wrap",gap:6}}>
                      <span style={{fontSize:12,color:"#6b7280"}}>Step {e.step} · ₦{e.stake?.toLocaleString()} @ {e.odds}x</span>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:11,color:"#374151"}}>{e.date}</span>
                        <span style={{fontSize:11,fontWeight:700,padding:"2px 10px",borderRadius:10,color:e.result==="WON"?"#00e676":"#ff5252",background:e.result==="WON"?"#00e67614":"#ff525214",border:`1px solid ${e.result==="WON"?"#00e67624":"#ff525224"}`}}>{e.result}</span>
                        <span style={{fontSize:13,fontWeight:700,color:"#9ca3af",fontFamily:"DM Mono"}}>₦{e.balance?.toLocaleString()}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
